<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>歴史クイズ（30問チャレンジ）</title>

<style>
body {
  font-family: sans-serif;
  background: #111;
  color: white;
  text-align: center;
  padding: 40px;
}

.card {
  background: #1e1e1e;
  padding: 30px;
  border-radius: 15px;
  max-width: 700px;
  margin: auto;
}

input {
  padding: 10px;
  width: 80%;
  border-radius: 10px;
  border: none;
  margin-top: 15px;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #00aaff;
  color: white;
  cursor: pointer;
}

.result { margin-top: 15px; }
.correct { color: #00ff88; }
.wrong { color: #ff5555; }

.score, .timer {
  margin-top: 10px;
}

.timer { color: #ffaa00; }
</style>
</head>

<body>

<div class="card" id="quizBox">
  <h2 id="question"></h2>

  <div class="score" id="score">0 / 30</div>
  <div class="timer" id="timer">残り30秒</div>

  <input type="text" id="userAnswer" placeholder="答えを入力">

  <br>
  <button onclick="checkAnswer()">回答する</button>

  <div class="result" id="result"></div>
</div>

<div class="card" id="endScreen" style="display:none;">
  <h2>終了！</h2>
  <p id="finalScore"></p>
  <button onclick="location.reload()">もう一度</button>
</div>

<script>
const quiz = [
{ q: "大化の改新が始まった年は？", a: ["645","645年"] },
{ q: "大宝律令が制定された年は？", a: ["701","701年"] },
{ q: "平安京に遷都した年は？", a: ["794","794年"] },
{ q: "鎌倉幕府を開いた人物は？", a: ["源頼朝"] },
{ q: "御成敗式目を制定した人物は？", a: ["北条泰時"] },
{ q: "承久の乱で敗れたのは？", a: ["後鳥羽上皇"] },
{ q: "元寇で攻めてきた国は？", a: ["元","モンゴル"] },
{ q: "室町幕府を開いた人物は？", a: ["足利尊氏"] },
{ q: "応仁の乱が始まった年は？", a: ["1467","1467年"] },
{ q: "織田信長が倒れた事件は？", a: ["本能寺の変"] },
{ q: "刀狩を行った人物は？", a: ["豊臣秀吉"] },
{ q: "関ヶ原の戦いの年は？", a: ["1600","1600年"] },
{ q: "江戸幕府を開いた年は？", a: ["1603","1603年"] },
{ q: "参勤交代を制度化した将軍は？", a: ["徳川家光"] },
{ q: "享保の改革を行った人物は？", a: ["徳川吉宗"] },
{ q: "寛政の改革を行った人物は？", a: ["松平定信"] },
{ q: "ペリー来航の年は？", a: ["1853","1853年"] },
{ q: "明治維新が始まった年は？", a: ["1868","1868年"] },
{ q: "廃藩置県が行われた年は？", a: ["1871","1871年"] },
{ q: "西南戦争の指導者は？", a: ["西郷隆盛"] },
{ q: "大日本帝国憲法が発布された年は？", a: ["1889","1889年"] },
{ q: "日露戦争が始まった年は？", a: ["1904","1904年"] },
{ q: "第一次世界大戦が始まった年は？", a: ["1914","1914年"] },
{ q: "第二次世界大戦が終わった年は？", a: ["1945","1945年"] },
{ q: "日本国憲法が施行された年は？", a: ["1947","1947年"] },
{ q: "墾田永年私財法が出された年は？", a: ["743","743年"] },
{ q: "院政を始めた天皇は？", a: ["白河天皇"] },
{ q: "建武の新政を行った天皇は？", a: ["後醍醐天皇"] },
{ q: "関東大震災が発生した年は？", a: ["1923","1923年"] },
{ q: "普通選挙法が成立した年は？", a: ["1925","1925年"] }
];

// シャッフル
let shuffled = quiz.sort(() => Math.random() - 0.5);

let index = 0;
let score = 0;
let time = 30;
let timer;

function normalize(text) {
  return text.replace(/\s/g, "").toLowerCase();
}

function startTimer() {
  time = 30;
  document.getElementById("timer").textContent = "残り" + time + "秒";

  timer = setInterval(() => {
    time--;
    document.getElementById("timer").textContent = "残り" + time + "秒";

    if (time <= 0) {
      clearInterval(timer);
      timeUp();
    }
  }, 1000);
}

function showQuestion() {
  if (index >= 30) return endGame();

  document.getElementById("question").textContent = shuffled[index].q;
  document.getElementById("userAnswer").value = "";
  document.getElementById("result").textContent = "";

  startTimer();
}

function checkAnswer() {
  clearInterval(timer);

  const user = normalize(document.getElementById("userAnswer").value);
  const answers = shuffled[index].a;

  const correct = answers.some(a => normalize(a) === user);

  if (correct) {
    score++;
    document.getElementById("result").innerHTML =
      "<span class='correct'>正解！</span>";
  } else {
    document.getElementById("result").innerHTML =
      "<span class='wrong'>不正解… 正解は「" + answers[0] + "」</span>";
  }

  index++;
  updateScore();

  setTimeout(showQuestion, 1200);
}

function timeUp() {
  document.getElementById("result").innerHTML =
    "<span class='wrong'>時間切れ！</span>";

  index++;
  updateScore();

  setTimeout(showQuestion, 1200);
}

function updateScore() {
  document.getElementById("score").textContent = score + " / 30";
}

function endGame() {
  document.getElementById("quizBox").style.display = "none";
  document.getElementById("endScreen").style.display = "block";
  document.getElementById("finalScore").textContent =
    "結果：" + score + " / 30";
}

// Enterキー対応
document.getElementById("userAnswer").addEventListener("keypress", function(e) {
  if (e.key === "Enter") checkAnswer();
});

// スタート
showQuestion();
</script>

</body>
</html>
